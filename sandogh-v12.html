(function () {
    // Design-ui pages are single compositions, so the whole body is editable.
    function markEditable() {
        document.body.classList.add('artifact-editable');
    }

    // Credit badge with idle-fade. Hover devices only.
    function initChromeUI() {
        if (!matchMedia('(hover: hover)').matches) return;

        var credit = document.createElement('div');
        credit.className = 'design-ui-credit';
        credit.setAttribute('aria-hidden', 'true');
        credit.innerHTML = '\u{1F49C} by ClickUp Brain';
        document.body.appendChild(credit);

        var timer = null;
        var fade = function (out) { credit.style.opacity = out ? '0' : ''; };
        fade(true);
        var show = function () {
            fade(false);
            clearTimeout(timer);
            timer = setTimeout(function () { fade(true); }, 3000);
        };
        document.addEventListener('mousemove', show);
        show();
    }

    function init() {
        markEditable();
        initChromeUI();
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
    } else {
        init();
    }
})();

<script>
const SID='1E8OVNRGvyKmyDBnghSjaIMGS6m0K-NtIqrL9KEB1kTM';
let D={members:[],ledger:[],loans:[],payments:[]},U=null;

function cellVal(cell){
if(!cell) return '';
// Use formatted value (f) if available, otherwise raw value (v)
if(cell.f) return cell.f;
if(cell.v===null||cell.v===undefined) return '';
return cell.v;
}

function loadSheet(n,cb){
const cn='cb_'+n+'_'+Date.now();
const url=`https://docs.google.com/spreadsheets/d/${SID}/gviz/tq?tqx=responseHandler:${cn}&sheet=${n}`;
window[cn]=function(r){delete window[cn];if(sc.parentNode)sc.parentNode.removeChild(sc);
if(r.status==='error'){cb(null,r.errors);return}
const t=r.table,h=t.cols.map(c=>c.label||c.id);
const rows=t.rows.map(row=>{const o={};row.c.forEach((c,i)=>{if(h[i])o[h[i]]=cellVal(c);});return o;});cb(rows);};
const sc=document.createElement('script');sc.src=url;
sc.onerror=function(){delete window[cn];if(sc.parentNode)sc.parentNode.removeChild(sc);cb(null,'err');};
document.body.appendChild(sc);}

function loadAll(){
const sheets=['members','ledger','loans','payments'];let done=0,err=false;
sheets.forEach(s=>{loadSheet(s,(rows,e)=>{if(err)return;
if(e){err=true;document.getElementById('lo').innerHTML='<div class="eb"><p>خطا در بارگذاری "'+s+'"</p><p style="margin-top:8px;font-size:.75rem">مطمئن شوید شیت دسترسی عمومی دارد</p></div>';return;}
D[s]=rows;done++;if(done===4){norm();document.getElementById('lo').classList.add('h');autoLogin();}});});}

function norm(){
D.members.forEach(r=>{r.member_id=Number(r.member_id)||0;r.name=String(r.name||'').trim();r.phone=String(r.phone||'').trim();r.password=String(r.password||'').trim();r.group_id=String(r.group_id||'').trim();r.role=String(r.role||'').trim().toLowerCase();});
D.ledger.forEach(r=>{r.member_id=Number(r.member_id)||0;r.date=String(r.date||'').trim();r.description=String(r.description||'').trim();r.debit=Number(r.debit)||0;r.credit=Number(r.credit)||0;});
D.loans.forEach(r=>{r.member_id=Number(r.member_id)||0;r.loan_id=String(r.loan_id||'').trim();r.savings=Number(r['Savings balance'])||0;r.outstanding=Number(r['Outstanding loan balance'])||0;r.amount=Number(r.amount)||0;r.installments=Number(r.installments)||0;r.start_date=String(r.start_date||'').trim();});
D.payments.forEach(r=>{r.loan_id=String(r.loan_id||'').trim();r.nam=String(r.nam||'').trim();r.installment_no=Number(r.installment_no)||0;r.amount=Number(r.amount)||0;r.due_date=String(r.due_date||'').trim();r.amount_paid=Number(r['amount paid'])||0;r.paid_date=String(r.paid_date||'').trim();});}

function fmt(n){if(n===0)return'۰';return(n<0?'-':'')+Math.abs(n).toLocaleString('fa-IR');}
function grp(gid){return D.members.filter(m=>m.group_id===gid);}
function ini(n){const p=n.split(' ');return p.length>1?p[0][0]+p[1][0]:p[0][0];}
function getLoan(mid){return D.loans.find(l=>l.member_id===mid)||null;}
function getPay(lid){return D.payments.filter(p=>p.loan_id===lid);}
function getOverdue(lid){return getPay(lid).filter(p=>p.amount_paid===0&&p.due_date<='1405/04/18');}
function getMemberStats(mid){
const loan=getLoan(mid);if(!loan||!loan.loan_id)return{overdue:0,overdueAmt:0,installAmt:0,saving10:0,totalDue:0};
const od=getOverdue(loan.loan_id);
const installAmt=Math.round(loan.amount/loan.installments);
const saving10=Math.round(installAmt*0.1);
return{overdue:od.length,overdueAmt:od.reduce((s,p)=>s+p.amount,0),installAmt,saving10,totalDue:installAmt+saving10};}

function autoLogin(){try{const p=localStorage.getItem('sf_p'),w=localStorage.getItem('sf_w'),r=localStorage.getItem('sf_r');
if(r==='1'&&p&&w){const u=D.members.find(m=>m.phone===p&&m.password===w);if(u){U=u;showApp();return;}}}catch(e){}showLogin();}

function showLogin(){document.getElementById('lp').style.display='flex';
try{const p=localStorage.getItem('sf_p'),w=localStorage.getItem('sf_w'),r=localStorage.getItem('sf_r');
if(r==='1'&&p){document.getElementById('ph').value=p;if(w)document.getElementById('pw').value=w;document.getElementById('rm').checked=true;}}catch(e){}}

function showApp(){document.getElementById('lp').style.display='none';document.getElementById('app').style.display='block';
document.getElementById('hun').textContent=U.name+(U.role==='leader'?' (سرگروه)':'');showOverview();}

function login(){const p=document.getElementById('ph').value.trim(),w=document.getElementById('pw').value.trim(),r=document.getElementById('rm').checked;
const u=D.members.find(m=>m.phone===p&&m.password===w);
if(!u){document.getElementById('le').style.display='block';return;}
document.getElementById('le').style.display='none';
try{if(r){localStorage.setItem('sf_p',p);localStorage.setItem('sf_w',w);localStorage.setItem('sf_r','1');}
else{localStorage.removeItem('sf_p');localStorage.removeItem('sf_w');localStorage.removeItem('sf_r');}}catch(e){}
U=u;showApp();}

function logout(){U=null;document.getElementById('app').style.display='none';document.getElementById('lp').style.display='flex';document.getElementById('le').style.display='none';}
document.addEventListener('keydown',e=>{if(e.key==='Enter'&&document.getElementById('lp').style.display==='flex')login();});

<div class="bank-row"><span class="bank-label">شماره شبا:</span><span class="bank-val">IR300190000000214371588006</span></div>
<div class="bank-row"><span class="bank-label">شماره حساب:</span><span class="bank-val">0214371588006</span></div>
</div></div>`;}

function footerHtml(){return '<p class="fn">طراحی و توسعه: <a href="https://instagram.com/omid.fard.sw" target="_blank">امید پاکت چیان فرد</a> · ۱۴۰۵</p>';}

function showOverview(){
const gm=U.role==='leader'?grp(U.group_id):[U];
if(U.role!=='leader'||gm.length===1){showDetail(U.member_id);return;}
const ts=gm.reduce((s,m)=>{const l=getLoan(m.member_id);return s+(l?l.savings:0);},0);
const td=gm.reduce((s,m)=>{const l=getLoan(m.member_id);return s+(l?l.outstanding:0);},0);
const tOd=gm.reduce((s,m)=>s+getMemberStats(m.member_id).overdue,0);
const tOdAmt=gm.reduce((s,m)=>s+getMemberStats(m.member_id).overdueAmt,0);
const tTotal=gm.reduce((s,m)=>s+getMemberStats(m.member_id).totalDue,0);

let h=`<div class="gt">
<div class="gi"><div class="gl">اعضای گروه</div><div class="gv">${gm.length.toLocaleString('fa-IR')} نفر</div></div>
<div class="gi"><div class="gl">مجموع پس‌انداز</div><div class="gv">${fmt(ts)} ریال</div></div>
<div class="gi"><div class="gl">مجموع بدهی وام</div><div class="gv" style="color:var(--er)">${fmt(td)} ریال</div></div>
<div class="gi"><div class="gl">اقساط معوق</div><div class="gv" style="color:var(--er)">${tOd.toLocaleString('fa-IR')} قسط (${fmt(tOdAmt)} ریال)</div></div>
<div class="gi"><div class="gl">جمع واریزی ماهانه (قسط + ۱۰٪)</div><div class="gv">${fmt(tTotal)} ریال</div></div>
</div>`;
h+='<div class="mg">';
gm.forEach(m=>{const l=getLoan(m.member_id);const sv=l?l.savings:0;const ob=l?l.outstanding:0;
const st=getMemberStats(m.member_id);
h+=`<div class="mc" onclick="showDetail(${m.member_id})"><div class="mh"><div class="ma">${ini(m.name)}</div><div><div class="mna">${m.name}</div><div class="mr">${m.role==='leader'?'سرگروه':'عضو'}</div></div></div>
<div class="ms">
<div><div class="msl">مانده حساب</div><div class="msv p">${fmt(sv)}</div></div>
<div><div class="msl">مانده بدهی وام</div><div class="msv ${ob>0?'n':'z'}">${fmt(ob)}</div></div>
<div><div class="msl">اقساط معوق</div><div class="msv ${st.overdue>0?'n':'z'}">${st.overdue>0?st.overdue.toLocaleString('fa-IR')+' قسط':'—'}</div></div>
<div><div class="msl">واریزی ماهانه</div><div class="msv w">${fmt(st.totalDue)}</div></div>
</div></div>`;});
h+='</div>';
h+=bankHtml();
h+=footerHtml();
document.getElementById('mc').innerHTML=h;}

function showDetail(mid){
const m=D.members.find(x=>x.member_id===mid);
const ml=D.ledger.filter(r=>r.member_id===mid);
const loan=getLoan(mid);
const sv=loan?loan.savings:0;const ob=loan?loan.outstanding:0;
const st=getMemberStats(mid);
const back=U.role==='leader'&&grp(U.group_id).length>1;
let h='';
if(back)h+=`<button class="bb" onclick="showOverview()">← بازگشت</button>`;
h+=`<div class="dh"><div class="dn">${m.name}</div></div>
<div class="su">
<div class="si hl"><div class="sl">مانده حساب پس‌انداز</div><div class="sv p">${fmt(sv)} <small style="font-size:.6rem;font-weight:400">ریال</small></div></div>
<div class="si"><div class="sl">مانده بدهی وام</div><div class="sv w">${fmt(ob)} <small style="font-size:.6rem;font-weight:400">ریال</small></div></div>
<div class="si"><div class="sl">اقساط معوق</div><div class="sv er">${st.overdue>0?st.overdue.toLocaleString('fa-IR')+' قسط ('+fmt(st.overdueAmt)+')':'—'}</div></div>
<div class="si"><div class="sl">مبلغ قسط</div><div class="sv">${fmt(st.installAmt)}</div></div>
<div class="si"><div class="sl">پس‌انداز اجباری (۱۰٪)</div><div class="sv">${fmt(st.saving10)}</div></div>
<div class="si"><div class="sl">جمع واریزی ماهانه</div><div class="sv w">${fmt(st.totalDue)} <small style="font-size:.6rem;font-weight:400">ریال</small></div></div>
</div>`;

if(loan&&loan.loan_id){
const pays=getPay(loan.loan_id);
const paidC=pays.filter(p=>p.amount_paid>0).length;
const rem=loan.installments-paidC;
const pct=loan.installments>0?(paidC/loan.installments*100).toFixed(0):0;
h+=`<div class="lp2"><div class="li"><span class="lti">وام ${fmt(loan.amount)} ریال (${loan.installments.toLocaleString('fa-IR')} قسط)</span>
<span class="ld2">شروع: ${loan.start_date}</span></div>
<div class="pb"><div class="pf" style="width:${pct}%"></div></div>
<div class="pl"><span>${paidC.toLocaleString('fa-IR')} قسط پرداخت شده</span><span>${rem.toLocaleString('fa-IR')} قسط باقیمانده</span></div></div>
<section class="sc"><div class="sh"><h2 class="st">اقساط وام</h2></div>
<div class="tw"><table><thead><tr><th>قسط</th><th>مبلغ</th><th>سررسید</th><th>تاریخ پرداخت</th><th>وضعیت</th></tr></thead><tbody>`;
pays.forEach(p=>{
const paid=p.amount_paid>0;const overdue=!paid&&p.due_date<='1405/04/18';
const cls=paid?'sp2':overdue?'spe':'su2';const txt=paid?'پرداخت شده':overdue?'معوق':'آینده';
h+=`<tr><td>${p.installment_no.toLocaleString('fa-IR')}</td><td>${fmt(p.amount)}</td><td>${p.due_date}</td>
<td>${p.paid_date||'—'}</td><td><span class="sb ${cls}">${txt}</span></td></tr>`;});
h+=`</tbody></table></div></section>`;}

if(ml.length>0){
h+=`<section class="sc"><div class="sh"><h2 class="st">صورتحساب</h2></div>
<div class="tw"><table><thead><tr><th>ردیف</th><th>تاریخ</th><th>شرح</th><th>بدهکار</th><th>بستانکار</th></tr></thead><tbody>`;
ml.forEach((r,i)=>{h+=`<tr><td>${(i+1).toLocaleString('fa-IR')}</td><td>${r.date}</td><td>${r.description}</td>
<td class="ad">${r.debit>0?fmt(r.debit):'—'}</td><td class="ac">${r.credit>0?fmt(r.credit):'—'}</td></tr>`;});
h+=`</tbody></table>
<div class="bx"><span class="bxl">مانده صورتحساب:</span><span class="bxv" style="color:var(--ok)">${fmt(sv)} ریال</span></div></div></section>`;}

h+=footerHtml();
document.getElementById('mc').innerHTML=h;}

loadAll();
</script>
</body>
</html>
