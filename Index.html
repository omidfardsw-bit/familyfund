<script>
(function () {
    function markEditable() {
        document.body.classList.add('artifact-editable');
    }
    function initChromeUI() {
        if (!matchMedia('(hover: hover)').matches) return;
        var credit = document.createElement('div');
        credit.className = 'design-ui-credit';
        credit.setAttribute('aria-hidden', 'true');
        credit.innerHTML = '\u{1F49C} by ClickUp Brain';
        document.body.appendChild(credit);
        var timer = null;
        var fade = function (out) { credit.style.opacity = out ? '0' : ''; };
        fade(true);
        var show = function () {
            fade(false);
            clearTimeout(timer);
            timer = setTimeout(function () { fade(true); }, 3000);
        };
        document.addEventListener('mousemove', show);
        show();
    }
    function init() {
        markEditable();
        initChromeUI();
    }
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
    } else {
        init();
    }
})();

<script>
const SID='1E8OVNRGvyKmyDBnghSjaIMGS6m0K-NtIqrL9KEB1kTM';
let D={members:[],ledger:[],loans:[],payments:[],time:[]},U=null;

function cellVal(cell){
if(!cell) return '';
if(cell.f) return cell.f;
if(cell.v===null||cell.v===undefined) return '';
return cell.v;
}

function loadSheet(n,cb){
const cn='cb_'+n+'_'+Date.now();
const url=`https://docs.google.com/spreadsheets/d/${SID}/gviz/tq?tqx=responseHandler:${cn}&sheet=${n}`;
window[cn]=function(r){delete window[cn];if(sc.parentNode)sc.parentNode.removeChild(sc);
if(r.status==='error'){cb(null,r.errors);return}
const t=r.table,h=t.cols.map(c=>c.label||c.id);
const rows=t.rows.map(row=>{const o={};row.c.forEach((c,i)=>{if(h[i])o[h[i]]=cellVal(c);});return o;});cb(rows, null, h);};
const sc=document.createElement('script');sc.src=url;
sc.onerror=function(){delete window[cn];if(sc.parentNode)sc.parentNode.removeChild(sc);cb(null,'err');};
document.body.appendChild(sc);}

function loadAll(){
const sheets=['members','ledger','loans','payments','time'];let done=0,err=false;
sheets.forEach(s=>{loadSheet(s,(rows,e,h)=>{if(err)return;
if(e){err=true;document.getElementById('lo').innerHTML='<div class="eb"><p>خطا در بارگذاری "'+s+'"</p><p style="margin-top:8px;font-size:.75rem">مطمئن شوید شیت دسترسی عمومی دارد</p></div>';return;}
D[s]=rows;
D[s+'_h']=h; 
done++;if(done===5){norm();document.getElementById('lo').classList.add('h');autoLogin();}});});}

function norm(){
D.members.forEach(r=>{r.member_id=Number(r.member_id)||0;r.name=String(r.name||'').trim();r.phone=String(r.phone||'').trim();r.password=String(r.password||'').trim();r.group_id=String(r.group_id||'').trim();r.role=String(r.role||'').trim().toLowerCase();});
D.ledger.forEach(r=>{r.member_id=Number(r.member_id)||0;r.date=String(r.date||'').trim();r.description=String(r.description||'').trim();r.debit=Number(r.debit)||0;r.credit=Number(r.credit)||0;});
D.loans.forEach(r=>{r.member_id=Number(r.member_id)||0;r.loan_id=String(r.loan_id||'').trim();r.savings=Number(r['Savings balance'])||0;r.outstanding=Number(r['Outstanding loan balance'])||0;r.amount=Number(r.amount)||0;r.installments=Number(r.installments)||0;r.start_date=String(r.start_date||'').trim();});
D.payments.forEach(r=>{r.loan_id=String(r.loan_id||'').trim();r.nam=String(r.nam||'').trim();r.installment_no=Number(r.installment_no)||0;r.amount=Number(r.amount)||0;r.due_date=String(r.due_date||'').trim();r.amount_paid=Number(r['amount paid'])||0;r.paid_date=String(r.paid_date||'').trim();});}

function fmt(n){if(n===0)return'۰';return(n<0?'-':'')+Math.abs(n).toLocaleString('fa-IR');}
function grp(gid){return D.members.filter(m=>m.group_id===gid);}
function ini(n){const p=n.split(' ');return p.length>1?p[0][0]+p[1][0]:p[0][0];}
function getLoan(mid){return D.loans.find(l=>l.member_id===mid)||null;}
function getPay(lid){return D.payments.filter(p=>p.loan_id===lid);}
function getOverdue(lid){return getPay(lid).filter(p=>p.amount_paid===0&&p.due_date<='1405/04/18');}
function getMemberStats(mid){
const loan=getLoan(mid);if(!loan||!loan.loan_id)return{overdue:0,overdueAmt:0,installAmt:0,saving10:0,totalDue:0};
const od=getOverdue(loan.loan_id);
const installAmt=Math.round(loan.amount/loan.installments);
const saving10=Math.round(installAmt*0.1);
return{overdue:od.length,overdueAmt:od.reduce((s,p)=>s+p.amount,0),installAmt,saving10,totalDue:installAmt+saving10};}

function autoLogin(){try{const p=localStorage.getItem('sf_p'),w=localStorage.getItem('sf_w'),r=localStorage.getItem('sf_r');
if(r==='1'&&p&&w){const u=D.members.find(m=>m.phone===p&&m.password===w);if(u){U=u;showLoginAlert();return;}}}catch(e){}showLogin();}

function showLoginAlert() {
    let updateDate = '';
    if (D.time_h && D.time_h[0] && D.time_h[0] !== 'A' && !D.time_h[0].startsWith('id:')) {
        updateDate = D.time_h[0];
    } else if (D.time && D.time.length > 0) {
        updateDate = Object.values(D.time[0])[0];
    }
    if (!updateDate) updateDate = 'نامشخص';

    document.getElementById('modalDateText').innerHTML = 'تاریخ آخرین به‌روزرسانی اطلاعات حساب‌ها:<br><b style="color:var(--pri); font-size:1.05rem; display:block; margin-top:4px;">' + updateDate + '</b>';

    const gm = grp(U.group_id);
    let tOdCount = 0;
    let tOdAmt = 0;
    
    gm.forEach(m => {
        const st = getMemberStats(m.member_id);
        tOdCount += st.overdue;
        tOdAmt += st.overdueAmt;
    });

    let alertBox = document.getElementById('modalAlertBox');
    
    if (tOdCount > 0) {
        alertBox.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>' +
                             'عضو محترم صندوق، در گروه شما مجموعاً <b>' + tOdCount.toLocaleString('fa-IR') + ' قسط معوق</b> به مبلغ کل <b>' + fmt(tOdAmt) + ' ریال</b> وجود دارد. لطفاً در اسرع وقت نسبت به پرداخت آن اقدام نمایید.';

    } else {
        alertBox.style.display = 'none';
    }

    document.getElementById('lp').style.display = 'none';
    document.getElementById('loginModal').style.display = 'flex';
}

// به مرورگر (پسوردمنیجر گوگل) یا سرویس‌های ذخیره رمز مثل سامسونگ پس پیشنهاد می‌دهد
// نام کاربری و رمز عبور را ذخیره کند. این کار فقط یک "پیشنهاد" است؛ تصمیم نهایی و
// نمایش پنجره‌ی ذخیره‌سازی کاملا در اختیار مرورگر/سیستم‌عامل کاربر است.
function saveCredentialToBrowser(username, password){
    // روش ۱: Credential Management API — کروم و اکثر مرورگرهای مبتنی بر اندروید
    // این API مستقیما به مرورگر می‌گوید که یک ورود موفق انجام شده و پیشنهاد ذخیره را نشان بده
    try{
        if(window.PasswordCredential && navigator.credentials && navigator.credentials.store){
            const cred = new PasswordCredential({id: username, password: password, name: username});
            navigator.credentials.store(cred).catch(function(){});
        }
    }catch(e){}

    // روش ۲: ارسال واقعی (POST) یک فرم مخفی به یک iframe نامرئی.
    // چون این برنامه تک‌صفحه‌ای (SPA) است و صفحه هرگز رفرش/navigate نمی‌شود، خیلی از
    // مرورگرها و همچنین سرویس‌هایی مثل سامسونگ پس (که بر پایه‌ی Android Autofill کار می‌کنند)
    // بدون یک "ارسال فرم واقعی" اصلا متوجه نمی‌شوند که ورود موفقی رخ داده تا پیشنهاد ذخیره
    // را نمایش دهند. این ترفند یک درخواست POST واقعی و بی‌ضرر ایجاد می‌کند (نتیجه‌اش برای
    // کاربر قابل مشاهده نیست) تا این رویداد به‌درستی تشخیص داده شود.
    try{
        let hf = document.createElement('form');
        hf.method = 'POST';
        hf.action = location.href.split('#')[0];
        hf.target = 'pwSaveFrame';
        hf.style.display = 'none';
        hf.setAttribute('autocomplete', 'on');

        let hu = document.createElement('input');
        hu.type = 'text'; hu.name = 'username'; hu.setAttribute('autocomplete','username'); hu.value = username;
        let hp = document.createElement('input');
        hp.type = 'password'; hp.name = 'password'; hp.setAttribute('autocomplete','current-password'); hp.value = password;

        hf.appendChild(hu);
        hf.appendChild(hp);
        document.body.appendChild(hf);
        hf.submit();
        setTimeout(function(){ if(hf.parentNode) hf.parentNode.removeChild(hf); }, 3000);
    }catch(e){}
}

// تابع کپی اطلاعات حساب بانکی
function copyText(txt, btnElement) {
    function showCopied() {
        let originalHTML = btnElement.innerHTML;
        btnElement.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="var(--ok)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>';
        setTimeout(() => { btnElement.innerHTML = originalHTML; }, 1500);
    }
    function fallbackCopy() {
        try {
            let ta = document.createElement('textarea');
            ta.value = txt;
            ta.style.position = 'fixed';
            ta.style.left = '-9999px';
            ta.style.top = '0';
            document.body.appendChild(ta);
            ta.focus();
            ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);
            showCopied();
        } catch (e) {
            alert('کپی انجام نشد. لطفا مقدار را به صورت دستی کپی کنید: ' + txt);
        }
    }
    if (navigator.clipboard && navigator.clipboard.writeText && window.isSecureContext) {
        navigator.clipboard.writeText(txt).then(showCopied).catch(fallbackCopy);
    } else {
        fallbackCopy();
    }
}

function openApp(appUrl,webUrl){
  var opened=false;
  var onHide=function(){if(document.hidden)opened=true;};
  document.addEventListener('visibilitychange',onHide);
  window.addEventListener('blur',function onBlur(){opened=true;window.removeEventListener('blur',onBlur);});
  var t=setTimeout(function(){
    document.removeEventListener('visibilitychange',onHide);
    if(!opened)window.location.href=webUrl;
  },1200);
  window.location.href=appUrl;
}

// تابع تولید فایل PDF
function exportPdf(mid) {
    const m = D.members.find(x => x.member_id === mid);
    const loan = getLoan(mid);
    if(!loan) return;
    const pays = getPay(loan.loan_id);
    
    let html = `
        <div style="text-align:center; margin-bottom: 25px; border-bottom: 2px solid #0056b3; padding-bottom: 15px;">
            <h2 style="margin: 0 0 10px 0; color: #0056b3;">دفترچه اقساط صندوق قرض‌الحسنه خانوادگی</h2>
            <p style="margin: 0; font-size: 14px; color: #555;">نام عضو: <b>${m.name}</b> &nbsp;|&nbsp; تاریخ شروع وام: <b>${loan.start_date}</b></p>
        </div>
        <div style="display: flex; justify-content: space-between; background: #f8f9fa; padding: 15px; border-radius: 8px; margin-bottom: 25px; font-size: 14px; border: 1px solid #ddd;">
            <div>مبلغ کل وام: <b>${fmt(loan.amount)} ریال</b></div>
            <div>تعداد کل اقساط: <b>${loan.installments.toLocaleString('fa-IR')} قسط</b></div>
        </div>
        <table style="width: 100%; border-collapse: collapse; font-size: 13px; text-align: right;">
            <thead>
                <tr style="background-color: #0056b3; color: white;">
                    <th style="padding: 10px; border: 1px solid #ccc;">ردیف قسط</th>
                    <th style="padding: 10px; border: 1px solid #ccc;">مبلغ قسط (ریال)</th>
                    <th style="padding: 10px; border: 1px solid #ccc;">تاریخ سررسید</th>
                    <th style="padding: 10px; border: 1px solid #ccc;">وضعیت پرداخت</th>
                    <th style="padding: 10px; border: 1px solid #ccc;">تاریخ واریز</th>
                </tr>
            </thead>
            <tbody>
    `;
    
    pays.forEach(p => {
        let isPaid = p.amount_paid > 0;
        let isOverdue = !isPaid && p.due_date <= '1405/04/18';
        let statusText = isPaid ? 'پرداخت شده' : (isOverdue ? 'معوق' : 'آینده');
        let statusColor = isPaid ? '#28a745' : (isOverdue ? '#dc3545' : '#6c757d');
        
        html += `
            <tr style="background-color: ${isPaid ? '#f8fff9' : (isOverdue ? '#fff5f5' : '#ffffff')};">
                <td style="padding: 10px; border: 1px solid #ddd; text-align: center;">${p.installment_no.toLocaleString('fa-IR')}</td>
                <td style="padding: 10px; border: 1px solid #ddd;">${fmt(p.amount)}</td>
                <td style="padding: 10px; border: 1px solid #ddd;">${p.due_date}</td>
                <td style="padding: 10px; border: 1px solid #ddd; color: ${statusColor}; font-weight: bold;">${statusText}</td>
                <td style="padding: 10px; border: 1px solid #ddd;">${p.paid_date || '—'}</td>
            </tr>
        `;
    });
    
    html += `</tbody></table>
             <div style="margin-top: 30px; text-align: center; font-size: 11px; color: #888;">
                تولید شده توسط سامانه صندوق قرض‌الحسنه
             </div>`;
    
    // دکمه موقتا غیرفعال شود تا کاربر چندبار کلیک نکند
    let btn = event.currentTarget;
    let oldTxt = btn.innerHTML;
    btn.innerHTML = 'در حال ساخت PDF...';
    btn.style.opacity = '0.7';
    
    let frame = null;
    
    function restoreBtn(){
        if (frame && frame.parentNode) document.body.removeChild(frame);
        btn.innerHTML = oldTxt;
        btn.style.opacity = '1';
    }
    
    function showError(err){
        restoreBtn();
        alert('خطا در ساخت PDF:\n' + (err && (err.message || (err.toString ? err.toString() : JSON.stringify(err)))));
        console.error(err);
    }
    
    try {
        // ساخت PDF داخل یک iframe جدا با استایل مستقل (بدون رنگ‌های oklch صفحه اصلی)
        // چون html2canvas فرمت رنگ oklch را نمی‌شناسد و روی صفحه اصلی خطا می‌دهد
        frame = document.createElement('iframe');
        frame.style.position = 'fixed';
        frame.style.top = '0';
        frame.style.left = '-9999px';
        frame.style.width = '210mm';
        // ارتفاع را فعلا آزاد می‌گذاریم تا بعد از رندر شدن محتوا، اندازه واقعی آن را بخوانیم
        frame.style.height = 'auto';
        frame.style.border = 'none';
        document.body.appendChild(frame);
        
        let fdoc = frame.contentDocument;
        fdoc.open();
        fdoc.write(`<!DOCTYPE html><html><head><meta charset="UTF-8">
            <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;600;700&display=swap" rel="stylesheet">
            <style>*{box-sizing:border-box;margin:0;padding:0}
            html,body{width:210mm}
            body{font-family:'Vazirmatn',system-ui,sans-serif;background:#ffffff;color:#333;direction:rtl;padding:30px}
            table{page-break-inside:auto}
            tr{page-break-inside:avoid;page-break-after:auto}
            thead{display:table-header-group}
            </style></head><body></body></html>`);
        fdoc.close();
        fdoc.body.innerHTML = html;
        
        setTimeout(() => {
            try {
                if (typeof html2pdf === 'undefined') {
                    throw new Error('کتابخانه html2pdf بارگذاری نشده است. اتصال اینترنت یا فیلترشکن خود را بررسی کنید و صفحه را رفرش کنید.');
                }
                
                // اندازه واقعی محتوای رندر شده را می‌خوانیم تا کل دفترچه دقیقا در یک صفحه جا شود
                let contentHeightPx = Math.max(fdoc.body.scrollHeight, fdoc.documentElement.scrollHeight);
                let contentWidthPx = fdoc.body.scrollWidth || Math.round(210 * 96 / 25.4);
                // تنظیم ارتفاع واقعی iframe قبل از گرفتن عکس، تا محتوا هنگام رندر بریده نشود
                frame.style.height = contentHeightPx + 'px';
                
                // تبدیل اندازه از پیکسل به میلی‌متر (چون عرض iframe دقیقا ۲۱۰ میلی‌متر تنظیم شده است).
                // نکته مهم: واحد px برای فرمت سفارشی صفحه در html2pdf/jsPDF به‌درستی پشتیبانی نمی‌شود
                // و باعث می‌شد محتوا با مقیاس اشتباه روی صفحه بیفتد (فضای خالی زیاد در بالا و بریده‌شدن
                // جدول از راست/چپ). واحد mm برای این کتابخانه استاندارد و قابل‌اعتماد است.
                let pxPerMm = contentWidthPx / 210;
                let contentHeightMm = contentHeightPx / pxPerMm;
                // یک مقدار حاشیه‌ی اطمینان کوچک به ارتفاع اضافه می‌کنیم تا خط آخر جدول قطع نشود
                let pageHeightMm = contentHeightMm + 6;
                
                let opt = {
                  margin:       0,
                  filename:     `Aghsat_${m.name}.pdf`,
                  image:        { type: 'jpeg', quality: 0.98 },
                  html2canvas:  { scale: 2, useCORS: true, windowWidth: contentWidthPx, windowHeight: contentHeightPx },
                  // اندازه‌ی صفحه دقیقا هم‌اندازه‌ی محتوا بر حسب میلی‌متر؛ همیشه یک صفحه،
                  // هرچقدر هم تعداد اقساط زیاد باشد
                  jsPDF:        { unit: 'mm', format: [210, pageHeightMm], orientation: 'portrait' }
                };
                
                html2pdf().set(opt).from(fdoc.body).save().then(() => {
                    restoreBtn();
                }).catch(showError);
            } catch(err) {
                showError(err);
            }
        }, 300);
    } catch(err) {
        showError(err);
    }
}

function showDetail(mid){
const m=D.members.find(x=>x.member_id===mid);
const ml=D.ledger.filter(r=>r.member_id===mid);
const loan=getLoan(mid);
const sv=loan?loan.savings:0;const ob=loan?loan.outstanding:0;
const st=getMemberStats(mid);
const back=U.role==='leader'&&grp(U.group_id).length>1;
let h='';
if(back)h+=`<button class="bb" onclick="showOverview()">← بازگشت</button>`;
h+=`<div class="dh"><div class="dn">${m.name}</div></div>
<div class="su">
<div class="si hl"><div class="sl">مانده حساب پس‌انداز</div><div class="sv p">${fmt(sv)} <small style="font-size:.6rem;font-weight:400">ریال</small></div></div>
<div class="si"><div class="sl">مانده بدهی وام</div><div class="sv w">${fmt(ob)} <small style="font-size:.6rem;font-weight:400">ریال</small></div></div>
<div class="si"><div class="sl">اقساط معوق</div><div class="sv er">${st.overdue>0?st.overdue.toLocaleString('fa-IR')+' قسط ('+fmt(st.overdueAmt)+')':'—'}</div></div>
<div class="si"><div class="sl">مبلغ قسط</div><div class="sv">${fmt(st.installAmt)}</div></div>
<div class="si"><div class="sl">پس‌انداز اجباری (۱۰٪)</div><div class="sv">${fmt(st.saving10)}</div></div>
<div class="si"><div class="sl">جمع واریزی ماهانه</div><div class="sv w">${fmt(st.totalDue)} <small style="font-size:.6rem;font-weight:400">ریال</small></div></div>
</div>`;

if(loan&&loan.loan_id){
const pays=getPay(loan.loan_id);
const paidC=pays.filter(p=>p.amount_paid>0).length;
const rem=loan.installments-paidC;
const pct=loan.installments>0?(paidC/loan.installments*100).toFixed(0):0;
h+=`<div class="lp2"><div class="li"><span class="lti">وام ${fmt(loan.amount)} ریال (${loan.installments.toLocaleString('fa-IR')} قسط)</span>
<span class="ld2">شروع: ${loan.start_date}</span></div>
<div class="pb"><div class="pf" style="width:${pct}%"></div></div>
<div class="pl"><span>${paidC.toLocaleString('fa-IR')} قسط پرداخت شده</span><span>${rem.toLocaleString('fa-IR')} قسط باقیمانده</span></div></div>
<section class="sc"><div class="sh"><h2 class="st">اقساط وام</h2>
<button class="bo" onclick="exportPdf(${mid})"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>دانلود PDF دفترچه</button>
</div>
<div class="tw"><table><thead><tr><th>قسط</th><th>مبلغ</th><th>سررسید</th><th>تاریخ پرداخت</th><th>وضعیت</th></tr></thead><tbody>`;
pays.forEach(p=>{
const paid=p.amount_paid>0;const overdue=!paid&&p.due_date<='1405/04/18';
const cls=paid?'sp2':overdue?'spe':'su2';const txt=paid?'پرداخت شده':overdue?'معوق':'آینده';
h+=`<tr><td>${p.installment_no.toLocaleString('fa-IR')}</td><td>${fmt(p.amount)}</td><td>${p.due_date}</td>
<td>${p.paid_date||'—'}</td><td><span class="sb ${cls}">${txt}</span></td></tr>`;});
h+=`</tbody></table></div></section>`;}

if(ml.length>0){
h+=`<section class="sc"><div class="sh"><h2 class="st">صورتحساب</h2></div>
<div class="tw"><table><thead><tr><th>ردیف</th><th>تاریخ</th><th>شرح</th><th>بدهکار</th><th>بستانکار</th></tr></thead><tbody>`;
ml.forEach((r,i)=>{h+=`<tr><td>${(i+1).toLocaleString('fa-IR')}</td><td>${r.date}</td><td>${r.description}</td>
<td class="ad">${r.debit>0?fmt(r.debit):'—'}</td><td class="ac">${r.credit>0?fmt(r.credit):'—'}</td></tr>`;});
h+=`</tbody></table>
<div class="bx"><span class="bxl">مانده صورتحساب:</span><span class="bxv" style="color:var(--ok)">${fmt(sv)} ریال</span></div></div></section>`;}

h+=footerHtml();
document.getElementById('mc').innerHTML=h;}

loadAll();
</script>
</body>
